<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgriPowder Intelligence — Complete Business Dashboard (Vegetables + Fruits + Herbs + Ayurvedic)</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f0f4f8;--bg2:#e8edf5;--card:#ffffff;--card2:#f7f9fc;
    --border:#d0daea;--border2:#b8c8de;
    --accent:#2563eb;--accent2:#3b82f6;--accent3:#1d4ed8;
    --gold:#d97706;--gold2:#f59e0b;
    --teal:#0d9488;--teal2:#14b8a6;
    --rose:#e11d48;--rose2:#f43f5e;
    --violet:#7c3aed;--violet2:#8b5cf6;
    --text:#1e293b;--text2:#475569;--text3:#94a3b8;
    --radius:12px;--radius2:8px;
    --shadow:0 2px 12px rgba(30,58,138,0.08);
    --shadow2:0 4px 24px rgba(30,58,138,0.13);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}

  /* ── scrollbar ── */
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:var(--bg2);}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}

  /* ── HEADER ── */
  .header{
    background:linear-gradient(90deg,#1e3a6e 0%,#1e40af 50%,#1d3461 100%);
    border-bottom:1px solid var(--border);
    padding:14px 28px;display:flex;align-items:center;
    justify-content:space-between;position:sticky;top:0;z-index:200;
    backdrop-filter:blur(12px);
  }
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-icon{width:40px;height:40px;border-radius:10px;
    background:linear-gradient(135deg,var(--accent3),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-size:20px;box-shadow:0 0 20px rgba(37,99,235,.35);}
  .logo-text{font-family:'Barlow Condensed',sans-serif;font-size:20px;
    font-weight:800;color:var(--text);letter-spacing:.5px;line-height:1;}
  .logo-sub{font-size:11px;color:var(--text3);font-weight:400;margin-top:2px;}
  .header-stats{display:flex;gap:28px;}
  .hstat{text-align:center;}
  .hstat-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;
    font-weight:700;color:var(--accent2);}
  .hstat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}

  /* ── LAYOUT ── */
  .layout{display:flex;flex:1;height:calc(100vh - 68px);}

  /* ── SIDEBAR ── */
  .sidebar{
    width:280px;min-width:280px;
    background:var(--bg2);border-right:1px solid var(--border);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .sb-top{padding:16px;}
  .search-wrap{position:relative;}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
    color:var(--text3);font-size:14px;}
  .search{width:100%;background:var(--card);border:1px solid var(--border);
    color:var(--text);border-radius:var(--radius2);padding:9px 12px 9px 34px;
    font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:.2s;}
  .search:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.2);}
  .cat-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
  .pill{background:transparent;border:1px solid var(--border);color:var(--text2);
    border-radius:99px;padding:4px 12px;font-size:11px;cursor:pointer;
    font-family:'DM Sans',sans-serif;font-weight:500;transition:.2s;}
  .pill.active,.pill:hover{background:var(--accent3);border-color:var(--accent);color:#fff;}
  .sb-list{flex:1;overflow-y:auto;padding:0 8px 16px;}
  .prod-card{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;border-radius:10px;cursor:pointer;
    border:1px solid transparent;margin-bottom:4px;transition:.15s;
    position:relative;
  }
  .prod-card:hover{background:var(--card);border-color:var(--border);}
  .prod-card.active{background:var(--card2);border-color:var(--accent);
    box-shadow:0 0 0 1px rgba(59,130,246,.15);}
  .prod-id{font-family:'Barlow Condensed',sans-serif;font-size:16px;
    font-weight:700;color:var(--text3);width:26px;min-width:26px;text-align:right;}
  .prod-card.active .prod-id{color:var(--accent2);}
  .prod-thumb{width:36px;height:36px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;font-size:18px;
    background:var(--bg);border:1px solid var(--border);}
  .prod-info{flex:1;min-width:0;}
  .prod-name{font-size:13px;font-weight:600;color:var(--text);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .prod-meta{font-size:10px;color:var(--text3);margin-top:2px;}
  .prod-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;
    text-transform:uppercase;letter-spacing:.3px;}
  .badge-a{background:rgba(245,158,11,.15);color:var(--gold2);}
  .badge-b{background:rgba(71,85,105,.2);color:#64748b;}
  .demand-dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0;}

  /* ── MAIN CONTENT ── */
  .main{flex:1;overflow-y:auto;padding:24px 28px;}

  /* ── WELCOME SCREEN ── */
  .welcome{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;text-align:center;gap:20px;
  }
  .welcome-icon{font-size:64px;animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  .welcome h2{font-family:'Barlow Condensed',sans-serif;font-size:32px;
    font-weight:700;color:var(--text);}
  .welcome p{color:var(--text2);font-size:15px;max-width:380px;line-height:1.6;}
  .quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
    max-width:600px;margin-top:8px;}
  .quick-item{background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);padding:16px;cursor:pointer;transition:.2s;text-align:center;}
  .quick-item:hover{border-color:var(--accent);transform:translateY(-2px);}
  .quick-item .qi-icon{font-size:24px;margin-bottom:8px;}
  .quick-item .qi-name{font-size:12px;font-weight:600;color:var(--text);}
  .quick-item .qi-id{font-size:11px;color:var(--text3);}

  /* ── PRODUCT DETAIL ── */
  .detail{display:none;flex-direction:column;gap:20px;animation:fadeIn .3s ease;}
  .detail.show{display:flex;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  /* ── DETAIL HEADER ── */
  .detail-header{
    background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);
    border:1px solid var(--border);border-radius:16px;padding:24px 28px;
    display:flex;align-items:center;gap:20px;position:relative;overflow:hidden;
  }
  .dh-bg{position:absolute;right:-20px;top:-20px;width:120px;height:120px;
    border-radius:50%;opacity:.06;background:var(--accent);}
  .dh-icon{width:64px;height:64px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;font-size:32px;
    background:var(--bg);border:1px solid var(--border);flex-shrink:0;
    box-shadow:0 4px 20px rgba(0,0,0,.4);}
  .dh-info{flex:1;}
  .dh-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;
    font-weight:800;color:var(--text);line-height:1;}
  .dh-sci{font-size:13px;color:var(--text3);font-style:italic;margin-top:4px;}
  .dh-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;
    text-transform:uppercase;letter-spacing:.3px;}
  .tag-cat{background:rgba(37,99,235,.12);color:var(--accent2);border:1px solid rgba(59,130,246,.3);}
  .tag-sub{background:rgba(13,148,136,.15);color:var(--teal2);border:1px solid rgba(13,148,136,.3);}
  .tag-demand{border:1px solid;}
  .dh-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;flex-shrink:0;}
  .dh-kpi{background:var(--bg);border:1px solid var(--border);border-radius:10px;
    padding:12px 16px;text-align:center;}
  .dh-kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;
    font-weight:700;line-height:1;}
  .dh-kpi-lbl{font-size:10px;color:var(--text3);margin-top:4px;
    text-transform:uppercase;letter-spacing:.4px;}

  /* ── TABS ── */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);
    padding-bottom:0;overflow-x:auto;}
  .tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;
    color:var(--text3);padding:10px 18px;font-family:'DM Sans',sans-serif;
    font-size:13px;font-weight:500;cursor:pointer;transition:.2s;white-space:nowrap;
    margin-bottom:-1px;}
  .tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent2);}
  .tab-btn:hover:not(.active){color:var(--text2);}
  .tab-panel{display:none;animation:fadeIn .25s ease;}
  .tab-panel.active{display:block;}

  /* ── SECTION GRID ── */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}

  /* ── CARDS ── */
  .sec-card{
    background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);padding:20px;
  }
  .sec-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;
    font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;
    margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .sec-title::before{content:'';display:block;width:3px;height:14px;
    background:var(--accent);border-radius:2px;}

  /* ── DATA ROWS ── */
  .data-row{display:flex;justify-content:space-between;align-items:flex-start;
    padding:8px 0;border-bottom:1px solid var(--border);}
  .data-row:last-child{border-bottom:none;}
  .dr-key{font-size:12px;color:var(--text3);flex-shrink:0;width:145px;}
  .dr-val{font-size:12px;color:var(--text);font-weight:500;text-align:right;
    flex:1;word-break:break-word;}
  .dr-val.accent{color:var(--accent2);}
  .dr-val.gold{color:var(--gold2);}
  .dr-val.teal{color:var(--teal2);}
  .dr-val.rose{color:var(--rose2);}

  /* ── PROGRESS BARS ── */
  .prog-wrap{margin-bottom:10px;}
  .prog-label{display:flex;justify-content:space-between;
    font-size:11px;color:var(--text2);margin-bottom:4px;}
  .prog-bar{height:6px;background:var(--bg);border-radius:99px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:99px;transition:width .6s ease;}

  /* ── REGION TABLE ── */
  .rtable{width:100%;border-collapse:collapse;font-size:12px;}
  .rtable th{text-align:left;color:var(--text3);font-weight:600;
    padding:8px 12px;border-bottom:2px solid var(--border);
    text-transform:uppercase;font-size:10px;letter-spacing:.4px;}
  .rtable td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);}
  .rtable tr:last-child td{border-bottom:none;}
  .rtable tr:hover td{background:rgba(30,45,69,.5);}
  .avail-bar{display:flex;align-items:center;gap:8px;}
  .avail-dots{display:flex;gap:3px;}
  .avail-dot{width:8px;height:8px;border-radius:50%;}

  /* ── SHELF CHART WRAPPER ── */
  .chart-wrap{position:relative;height:200px;}

  /* ── MONTH GRID ── */
  .month-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;margin-top:8px;}
  .month-cell{border-radius:4px;height:28px;display:flex;align-items:center;
    justify-content:center;font-size:9px;font-weight:600;
    text-transform:uppercase;letter-spacing:.3px;transition:.2s;}
  .month-active{background:var(--accent);color:#fff;}
  .month-peak{background:var(--gold);color:#000;}
  .month-inactive{background:var(--card2);color:var(--text3);}
  .month-label{font-size:9px;color:var(--text3);text-align:center;margin-top:3px;
    text-transform:uppercase;}

  /* ── STAT CHIPS ── */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .chip{background:var(--card2);border:1px solid var(--border);
    border-radius:8px;padding:8px 14px;font-size:11px;}
  .chip-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;
    font-weight:700;display:block;line-height:1;}
  .chip-key{color:var(--text3);font-size:10px;margin-top:2px;}

  /* ── BUYERS LIST ── */
  .buyer-item{display:flex;align-items:center;gap:8px;padding:7px 0;
    border-bottom:1px solid var(--border);}
  .buyer-item:last-child{border-bottom:none;}
  .buyer-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;}
  .buyer-name{font-size:12px;color:var(--text);}

  /* ── USES GRID ── */
  .use-card{background:var(--card2);border:1px solid var(--border);
    border-radius:10px;padding:14px;text-align:center;}
  .use-icon{font-size:24px;margin-bottom:8px;}
  .use-name{font-size:12px;font-weight:600;color:var(--text);}

  /* ── PRICE TREND ── */
  .price-chart-wrap{position:relative;height:180px;}

  /* ── NOTES BOX ── */
  .notes-box{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);
    border-radius:10px;padding:14px;font-size:12px;color:var(--text2);
    line-height:1.6;margin-top:12px;}
  .notes-box strong{color:var(--accent2);}

  /* ── SUPPLIER ── */
  .sup-card{background:var(--card2);border:1px solid var(--border);
    border-radius:10px;padding:14px;margin-bottom:10px;}
  .sup-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
  .sup-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
  .sup-tag{background:var(--bg);border:1px solid var(--border);border-radius:6px;
    padding:2px 8px;font-size:10px;color:var(--text3);}

  /* ── RELIABILITY ── */
  .rel-stars{display:flex;gap:2px;}
  .rel-star{font-size:12px;}

  /* ── EMPTY ── */
  .empty{text-align:center;padding:32px;color:var(--text3);font-size:13px;}

  @media(max-width:900px){
    .sidebar{width:220px;min-width:220px;}
    .dh-kpis{grid-template-columns:repeat(2,1fr);}
    .grid2,.grid3,.grid4{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <div class="logo-icon">🌾</div>
    <div>
      <div class="logo-text">AgriPowder Intelligence</div>
      <div class="logo-sub">Dehydrated Vegetable Business Database</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-val">45</div><div class="hstat-lbl">Products</div></div>
    <div class="hstat"><div class="hstat-val">8</div><div class="hstat-lbl">Data Modules</div></div>
    <div class="hstat"><div class="hstat-val">25</div><div class="hstat-lbl">Export SKUs</div></div>
    <div class="hstat"><div class="hstat-val">12+</div><div class="hstat-lbl">States</div></div>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-top">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search" id="searchInput" type="text" placeholder="Search product or ID…" oninput="filterProducts()"/>
      </div>
      <div class="cat-pills">
        <button class="pill active" onclick="setCat('All',this)">All</button>
        <button class="pill" onclick="setCat('Vegetable',this)">Vegetable</button>
        <button class="pill" onclick="setCat('Herb',this)">Herb</button>
        <button class="pill" onclick="setCat('Ayurvedic',this)">Ayurvedic</button>
        <button class="pill" onclick="setCat('Fruit',this)">🍎 Fruit</button>
      </div>
    </div>
    <div class="sb-list" id="productList"></div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent">

    <!-- WELCOME -->
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">🌿</div>
      <h2>Select a Product</h2>
      <p>Click any product ID from the sidebar to view complete data — regions, pricing, processing, shelf life, market demand, and suppliers.</p>
      <div class="quick-grid" id="quickGrid"></div>
    </div>

    <!-- DETAIL VIEW -->
    <div class="detail" id="detailView">

      <!-- HEADER -->
      <div class="detail-header">
        <div class="dh-bg"></div>
        <div class="dh-icon" id="dh-icon">🧅</div>
        <div class="dh-info">
          <div class="dh-title" id="dh-title">Onion</div>
          <div class="dh-sci" id="dh-sci">Allium cepa</div>
          <div class="dh-tags" id="dh-tags"></div>
        </div>
        <div class="dh-kpis" id="dh-kpis"></div>
      </div>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('overview',this)">📋 Overview</button>
        <button class="tab-btn" onclick="showTab('season',this)">🌱 Seasonality</button>
        <button class="tab-btn" onclick="showTab('region',this)">🗺 Regions</button>
        <button class="tab-btn" onclick="showTab('price',this)">💰 Pricing</button>
        <button class="tab-btn" onclick="showTab('process',this)">⚙ Processing</button>
        <button class="tab-btn" onclick="showTab('storage',this)">📦 Storage</button>
        <button class="tab-btn" onclick="showTab('market',this)">📈 Market</button>
        <button class="tab-btn" onclick="showTab('supplier',this)">🤝 Suppliers</button>
      </div>

      <!-- TAB PANELS -->
      <div id="tab-overview" class="tab-panel active"></div>
      <div id="tab-season" class="tab-panel"></div>
      <div id="tab-region" class="tab-panel"></div>
      <div id="tab-price" class="tab-panel"></div>
      <div id="tab-process" class="tab-panel"></div>
      <div id="tab-storage" class="tab-panel"></div>
      <div id="tab-market" class="tab-panel"></div>
      <div id="tab-supplier" class="tab-panel"></div>
    </div>
  </main>
</div>

<script>

function demandColor(d){
  return d==="V.High"?"#22c55e":d==="High"?"#f59e0b":d==="Medium"?"#0d9488":"#475569";
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER PRODUCT LIST
// ═══════════════════════════════════════════════════════════════════════════
function renderList(){
  const q = document.getElementById("searchInput").value.toLowerCase();
  const list = document.getElementById("productList");
  list.innerHTML = "";
  let count = 0;
  for(let i=1;i<=45;i++){
    const p = DB[i]; if(!p) continue;
    if(currentCat!=="All" && p.cat!==currentCat) continue;
    if(q && !p.name.toLowerCase().includes(q) && !String(i).includes(q)) continue;
    count++;
    const div = document.createElement("div");
    div.className = "prod-card"+(currentId===i?" active":"");
    div.onclick = ()=>loadProduct(i);
    div.innerHTML=`
      <span class="prod-id">${i}</span>
      <div class="prod-thumb">${p.icon||"🌿"}</div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-meta">${p.cat} · ${p.sub||""}</div>
      </div>
      <div>
        <span class="prod-badge ${p.grade==="A"?"badge-a":"badge-b"}">${p.grade||"B"}</span>
        <div class="demand-dot" style="background:${demandColor(p.demand)};margin-top:4px;margin-left:auto;"></div>
      </div>
    `;
    list.appendChild(div);
  }
  if(count===0) list.innerHTML='<div class="empty">No products found</div>';
}

function setCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));
  btn.classList.add("active");
  renderList();
}
function filterProducts(){renderList();}

function loadProduct(id){
  currentId=id;
  const p=DB[id];
  document.getElementById("welcomeScreen").style.display="none";
  const dv=document.getElementById("detailView");
  dv.className="detail show";
  renderList();
  // Header
  document.getElementById("dh-icon").textContent=p.icon||"🌿";
  document.getElementById("dh-title").textContent=p.name;
  document.getElementById("dh-sci").textContent=p.sci;
  // Tags
  const tags=document.getElementById("dh-tags");
  const dc=demandColor(p.demand);
  tags.innerHTML=`
    <span class="tag tag-cat">${p.cat}</span>
    <span class="tag tag-sub">${p.sub||""}</span>
    <span class="tag tag-demand" style="background:${dc}22;color:${dc};border-color:${dc}44">${p.demand} Demand</span>
    <span class="tag" style="background:${p.export?"rgba(99,102,241,.15)":"rgba(71,85,105,.15)"};color:${p.export?"#a5b4fc":"#475569"};border:1px solid ${p.export?"rgba(99,102,241,.3)":"rgba(71,85,105,.3)"}">${p.export?"✈ Export":"Domestic"}</span>
    <span class="tag" style="background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)">Grade ${p.grade||"B"}</span>
  `;
  // KPIs
  const kpis=document.getElementById("dh-kpis");
  kpis.innerHTML=[
    {v:p.yield,l:"Powder Yield",c:"#3b82f6"},
    {v:p.ratio||"8–10:1",l:"Fresh:Powder",c:"#f59e0b"},
    {v:p.cagr+"%",l:"Market CAGR",c:"#22c55e"},
    {v:p.cost||"—",l:"Process Cost/kg",c:"#a78bfa"},
  ].map(k=>`<div class="dh-kpi"><div class="dh-kpi-val" style="color:${k.c}">${k.v}</div><div class="dh-kpi-lbl">${k.l}</div></div>`).join("");
  // Reset tabs
  showTab("overview",document.querySelector(".tab-btn.active")||document.querySelector(".tab-btn"),true);
  // Render panels
  renderOverview(p);
  renderSeason(p);
  renderRegion(p);
  renderPrice(p);
  renderProcess(p);
  renderStorage(p);
  renderMarket(p);
  renderSupplier(p);
  document.getElementById("mainContent").scrollTop=0;
}

function showTab(name,btn,skipBtn=false){
  document.querySelectorAll(".tab-panel").forEach(p=>{p.classList.remove("active");});
  document.getElementById("tab-"+name).classList.add("active");
  if(!skipBtn){
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    if(btn) btn.classList.add("active");
  }
  // Draw charts on tab show
  if(name==="price"&&currentId) drawPriceChart(DB[currentId]);
  if(name==="storage"&&currentId) drawShelfChart(DB[currentId]);
}

function renderSeason(p){

  // Month availability visualization

  const sowingStr=(s.sowing||"").toLowerCase();
  const harvestStr=(s.harvestStart||"").toLowerCase()+" "+(s.harvestEnd||"").toLowerCase();
  const peakStr=(s.peak||"").toLowerCase();
  const monthMap={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  function getStatus(i,sow,harv,pk){
    const m=months[i].toLowerCase().slice(0,3);
    if(pk.includes(m)||pk.includes(months[i].toLowerCase())) return "peak";
    if(harv.includes(m)||harv.includes(months[i].toLowerCase())) return "active";
    if(sow.includes(m)||sow.includes(months[i].toLowerCase())) return "sowing";

    else if(st==="sowing"){cls="";style="background:rgba(99,102,241,.3);color:#a5b4fc";label="Sow";}
    return `<div>
      <div class="month-cell ${cls}" style="${style}" title="${label||m}">${m}</div>

        </div>
      </div>
      <div class="grid2">
        <div class="sec-card">
          <div class="sec-title">Crop Details</div>
          ${dr("Crop Type",s.cropType)}
          ${dr("Sowing Month",s.sowing,"accent")}
          ${dr("Harvest Start",s.harvestStart)}
          ${dr("Harvest End",s.harvestEnd)}
          ${dr("Peak Harvest",s.peak,"gold")}
          ${dr("Crop Duration",s.duration)}
          ${dr("Season Type",s.type)}
          ${dr("Annual / Seasonal",s.annual)}

          <div class="sec-title">Growing Requirements</div>
          ${dr("Climatic Requirement",s.climate)}
          ${dr("Rainfall Needed",s.rainfall)}
          ${dr("Temperature Range",s.temp)}
          ${dr("Yield per Acre",s.yield,"teal")}

            <div class="sec-title">Yield Benchmark</div>
            <div class="prog-wrap">
              <div class="prog-label"><span>Yield per Acre</span><span>${s.yield}</span></div>
              <div class="prog-bar"><div class="prog-fill" style="width:65%;background:var(--accent)"></div></div>
            </div>
            <div class="prog-wrap">
              <div class="prog-label"><span>Crop Duration (relative)</span><span>${s.duration}</span></div>
              <div class="prog-bar"><div class="prog-fill" style="width:55%;background:var(--gold)"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB 3 — REGIONS
// ═══════════════════════════════════════════════════════════════════════════
function renderRegion(p){
  const el=document.getElementById("tab-region");
  const regions=p.regions||[];
  if(!regions.length){el.innerHTML='<div class="empty" style="margin-top:24px">No region data available</div>';return;}
  const rows=regions.map(r=>{
    const a=parseInt(r.avail)||5;
    const dots=Array.from({length:10},(_,i)=>`<div class="avail-dot" style="background:${i<a?"var(--accent)":"var(--border)"}"></div>`).join("");
    return `<tr>
      <td><strong>${r.region}</strong></td>
      <td style="color:var(--accent2)">${r.state}</td>
      <td>${r.district}</td>
      <td><span style="font-size:11px;color:var(--text3)">${r.belt}</span></td>
      <td style="color:var(--gold2)">${r.vol}</td>
      <td style="color:var(--teal2)">${r.peak}</td>
      <td>${r.logistics}</td>
      <td><div class="avail-bar"><div class="avail-dots">${dots}</div><span style="font-size:11px;margin-left:2px">${a}/10</span></div></td>
    </tr>`;
  }).join("");
  const stateCards=regions.map((r,i)=>`
    <div style="background:var(--card2);border:1px solid var(--border);border-left:3px solid ${["#3b82f6","#f59e0b","#0d9488","#7c3aed"][i%4]};border-radius:10px;padding:16px">
      <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px">${r.state}</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">📍 ${r.district}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px">Belt: <span style="color:var(--accent2)">${r.belt}</span></div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px">Volume: <span style="color:var(--gold2)">${r.vol}</span></div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:4px">Peak: <span style="color:var(--teal2)">${r.peak}</span></div>
      <div style="font-size:12px;color:var(--text2)">Logistics: ${r.logistics}</div>
    </div>
  `).join("");
  el.innerHTML=`
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:16px">
      <div class="sec-card">
        <div class="sec-title">All Growing Regions — ${p.name}</div>
        <div style="overflow-x:auto">
          <table class="rtable">
            <thead><tr>
              <th>Region</th><th>State</th><th>District / Area</th>
              <th>Major Belt</th><th>Volume</th><th>Peak Supply</th>
              <th>Logistics Cost</th><th>Availability</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
      <div class="sec-title">State-wise Sourcing Cards</div>
      <div class="grid${Math.min(regions.length,4)===1?"1":regions.length<=2?"2":"3"}" style="grid-template-columns:repeat(${Math.min(regions.length,3)},1fr)">${stateCards}</div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB 4 — PRICING
// ═══════════════════════════════════════════════════════════════════════════
function renderPrice(p){
  const el=document.getElementById("tab-price");
  const pr=p.prices||{};
  const vol=pr.volatility||5;
  const volColor=vol>=8?"#f87171":vol>=6?"#f59e0b":"#22c55e";
  el.innerHTML=`
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:16px">
      <div class="grid3">
        <div class="sec-card" style="text-align:center">
          <div style="font-size:28px;font-weight:800;color:#3b82f6;font-family:'Barlow Condensed',sans-serif">
            ₹${pr.avg?pr.avg[0]:0}/kg</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">Jan Avg Farm Price</div>
        </div>
        <div class="sec-card" style="text-align:center">
          <div style="font-size:28px;font-weight:800;color:#22c55e;font-family:'Barlow Condensed',sans-serif">
            ₹${pr.min?Math.min(...pr.min):0}/kg</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">Lowest Annual Price</div>
        </div>
        <div class="sec-card" style="text-align:center">
          <div style="font-size:28px;font-weight:800;color:${volColor};font-family:'Barlow Condensed',sans-serif">${vol}/10</div>
          <div style="font-size:11px;color:var(--text3);margin-top:4px">Price Volatility Score</div>
        </div>
      </div>
      <div class="sec-card">
        <div class="sec-title">Monthly Farm Gate Price — Min / Avg / Max (₹/kg)</div>
        <div class="price-chart-wrap"><canvas id="priceChart"></canvas></div>
        <div style="font-size:11px;color:var(--text3);margin-top:8px">
          Source: APMC / AGMARKNET data — ${(pr.markets||[]).join(", ")}
        </div>
      </div>
      <div class="sec-card">
        <div class="sec-title">Procurement Strategy</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div>
            <div style="font-size:12px;color:var(--text3);margin-bottom:10px">Best Buy Window (Lowest Prices)</div>
            ${(pr.months||[]).map((m,i)=>({m,v:pr.avg?pr.avg[i]:0})).sort((a,b)=>a.v-b.v).slice(0,4).map(({m,v})=>`
              <div class="prog-wrap">
                <div class="prog-label"><span style="color:var(--text2)">${m}</span><span style="color:var(--accent2)">₹${v}/kg avg</span></div>
                <div class="prog-bar"><div class="prog-fill" style="width:${Math.round((v/(pr.avg?Math.max(...pr.avg):100))*100)}%;background:var(--accent)"></div></div>
              </div>
            `).join("")}
          </div>
          <div>
            <div style="font-size:12px;color:var(--text3);margin-bottom:10px">Peak Season (Highest Prices — Avoid Buying)</div>
            ${(pr.months||[]).map((m,i)=>({m,v:pr.avg?pr.avg[i]:0})).sort((a,b)=>b.v-a.v).slice(0,4).map(({m,v})=>`
              <div class="prog-wrap">
                <div class="prog-label"><span style="color:var(--text2)">${m}</span><span style="color:var(--rose2)">₹${v}/kg avg</span></div>
                <div class="prog-bar"><div class="prog-fill" style="width:${Math.round((v/(pr.avg?Math.max(...pr.avg):100))*100)}%;background:var(--rose)"></div></div>
              </div>
            `).join("")}
          </div>
        </div>
      </div>
    </div>
  `;
  // Chart drawn via showTab
  setTimeout(()=>drawPriceChart(p),50);
}

function drawPriceChart(p){
  const pr=p.prices||{};
  if(!pr.months) return;
  if(priceChartInstance){priceChartInstance.destroy();priceChartInstance=null;}
  const ctx=document.getElementById("priceChart");
  if(!ctx) return;
  priceChartInstance=new Chart(ctx,{
    type:"line",
    data:{
      labels:pr.months,
      datasets:[
        {label:"Max Price",data:pr.max,borderColor:"#f87171",backgroundColor:"rgba(248,113,113,.08)",fill:true,borderWidth:1.5,pointRadius:3,tension:.4},
        {label:"Avg Price",data:pr.avg,borderColor:"#f59e0b",backgroundColor:"rgba(245,158,11,.1)",fill:true,borderWidth:2,pointRadius:4,tension:.4},
        {label:"Min Price",data:pr.min,borderColor:"#22c55e",backgroundColor:"rgba(34,197,94,.12)",fill:true,borderWidth:1.5,pointRadius:3,tension:.4},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:"#475569",font:{size:11}}},
        tooltip:{backgroundColor:"#e8eef8",borderColor:"#cbd5e1",borderWidth:1,titleColor:"#3b82f6",bodyColor:"#1e293b",callbacks:{label:ctx=>`₹${ctx.parsed.y}/kg`}}
      },
      scales:{
        x:{grid:{color:"rgba(30,45,69,.5)"},ticks:{color:"#475569",font:{size:11}}},
        y:{grid:{color:"rgba(30,45,69,.5)"},ticks:{color:"#475569",font:{size:11},callback:v=>"₹"+v}}
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB 5 — PROCESSING
// ═══════════════════════════════════════════════════════════════════════════
function renderProcess(p){
  const pc=p.process||{};
  const el=document.getElementById("tab-process");
  const dr=(k,v,cls="")=>`<div class="data-row"><span class="dr-key">${k}</span><span class="dr-val ${cls}">${v||"—"}</span></div>`;
  const diffColor={"Easy":"#22c55e","Medium":"#f59e0b","Difficult":"#f87171"}[p.difficulty]||"#475569";
  el.innerHTML=`
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:16px">
      <div class="grid2">
        <div class="sec-card">
          <div class="sec-title">Dehydration Process</div>
          ${dr("Method",pc.method,"accent")}
          ${dr("Pre-Processing",pc.preProcess)}
          ${dr("Blanching Required",pc.blanching)}
          ${dr("Drying Temperature",pc.dryTemp,"gold")}
          ${dr("Drying Time",pc.dryTime)}
          ${dr("Target Moisture",pc.moisture,"teal")}
          ${dr("Particle Size",pc.particleSize)}
          ${dr("Processing Difficulty",`<span style="color:${diffColor};font-weight:700">${p.difficulty}</span>`)}
        </div>
        <div class="sec-card">
          <div class="sec-title">Economics & Efficiency</div>
          ${dr("Processing Cost/kg",pc.costPerKg,"gold")}
          ${dr("Energy Consumption",pc.energy)}
          ${dr("Waste Percentage",pc.waste,"rose")}
          ${dr("By-Products",pc.byProducts)}
          <div style="margin-top:16px">
            <div class="sec-title">Cost Efficiency Score</div>
            <div class="prog-wrap">
              <div class="prog-label"><span>Cost Efficiency</span><span style="color:var(--accent2)">${pc.costPerKg}</span></div>
              <div class="prog-bar"><div class="prog-fill" style="width:${pc.costPerKg?Math.max(20,100-parseInt(pc.costPerKg.replace(/[^0-9]/g,""))/3):50}%;background:var(--accent)"></div></div>
            </div>
            <div class="prog-wrap">
              <div class="prog-label"><span>Waste Generated</span><span style="color:var(--rose2)">${pc.waste}</span></div>
              <div class="prog-bar"><div class="prog-fill" style="width:${parseInt(pc.waste||"15")}%;background:var(--rose)"></div></div>
            </div>
          </div>
        </div>
      </div>
      <div class="sec-card">
        <div class="sec-title">Processing Flow</div>
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:8px 0">
          ${["Raw Material","Washing & Sorting","Pre-Processing","Blanching (if needed)","Dehydration / Drying","Grinding / Milling","Sieving","Quality Check","Packaging"].map((s,i)=>`
            <div style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:11px;color:var(--text2);font-weight:500">
              <span style="color:var(--accent);margin-right:6px">${i+1}</span>${s}
            </div>
            ${i<8?'<span style="color:var(--text3);font-size:16px">→</span>':""}
          `).join("")}
        </div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB 6 — STORAGE
// ═══════════════════════════════════════════════════════════════════════════
function renderStorage(p){
  const st=p.storage||{};
  const el=document.getElementById("tab-storage");
  const dr=(k,v,cls="")=>`<div class="data-row"><span class="dr-key">${k}</span><span class="dr-val ${cls}">${v||"—"}</span></div>`;
  el.innerHTML=`
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:16px">
      <div class="grid3">
        <div class="sec-card" style="text-align:center">
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Fresh Shelf Life</div>
          <div style="font-size:26px;font-weight:800;color:#f87171;font-family:'Barlow Condensed',sans-serif">${st.freshLife||"—"}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:4px">Before processing</div>
        </div>
        <div class="sec-card" style="text-align:center">
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Powder Shelf Life</div>
          <div style="font-size:26px;font-weight:800;color:#f59e0b;font-family:'Barlow Condensed',sans-serif">${st.powderLife||"—"}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:4px">Standard packaging</div>
        </div>
        <div class="sec-card" style="text-align:center">
          <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">N₂ Flush Shelf Life</div>
          <div style="font-size:26px;font-weight:800;color:#22c55e;font-family:'Barlow Condensed',sans-serif">${st.nitrogen||"—"}</div>
          <div style="font-size:10px;color:var(--text3);margin-top:4px">Best option</div>
        </div>
      </div>
      <div class="sec-card">
        <div class="sec-title">Shelf Life Progression</div>
        <div class="chart-wrap"><canvas id="shelfChart"></canvas></div>
      </div>
      <div class="grid2">
        <div class="sec-card">
          <div class="sec-title">Storage Conditions</div>
          ${dr("Storage Temperature",st.temp,"accent")}
          ${dr("Humidity Requirement",st.humidity)}
          ${dr("Dehydrated Shelf Life",st.dehyLife,"gold")}
          ${dr("Vacuum Pack Life",st.vacuum,"teal")}
          ${dr("Nitrogen Pack Life",st.nitrogen,"teal")}
        </div>
        <div class="sec-card">
          <div class="sec-title">Packaging Options</div>
          ${dr("Recommended Packaging",st.packaging,"accent")}
          <div style="margin-top:12px">
            <div class="sec-title" style="margin-bottom:10px">Shelf Life Risk Factors</div>
            <div style="background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:12px;font-size:12px;color:var(--rose2);line-height:1.6">
              ⚠️ ${st.risks||"Standard storage precautions apply"}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  setTimeout(()=>drawShelfChart(p),50);
}

function drawShelfChart(p){
  const st=p.storage||{};
  if(shelfChartInstance){shelfChartInstance.destroy();shelfChartInstance=null;}
  const ctx=document.getElementById("shelfChart");
  if(!ctx) return;
  function parseMonths(str){if(!str||str==="—")return 0;const m=str.match(/(\d+)/);return m?parseInt(m[1]):0;}
  shelfChartInstance=new Chart(ctx,{
    type:"bar",
    data:{
      labels:["Fresh Product","Dehydrated","Powder (Normal)","Vacuum Pack","N₂ Pack"],
      datasets:[{
        label:"Shelf Life (Months)",
        data:[parseMonths(st.freshLife)*0.25,parseMonths(st.dehyLife),parseMonths(st.powderLife),parseMonths(st.vacuum),parseMonths(st.nitrogen)],
        backgroundColor:["rgba(248,113,113,.7)","rgba(245,158,11,.7)","rgba(59,130,246,.7)","rgba(13,148,136,.7)","rgba(34,197,94,.7)"],
        borderRadius:8,borderWidth:0,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,indexAxis:"y",
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:"#e8eef8",borderColor:"#cbd5e1",borderWidth:1,titleColor:"#60a5fa",bodyColor:"#1e293b",callbacks:{label:c=>`${c.parsed.x} months`}}
      },
      scales:{
        x:{grid:{color:"rgba(30,45,69,.5)"},ticks:{color:"#475569",font:{size:11},callback:v=>v+"mo"}},
        y:{grid:{display:false},ticks:{color:"#1e293b",font:{size:11}}}
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB 7 — MARKET
// ═══════════════════════════════════════════════════════════════════════════
function renderMarket(p){

  const buyers=(mk.buyers||[]).map(b=>`<div class="buyer-item"><div class="buyer-dot"></div><div class="buyer-name">${b}</div></div>`).join("");
  el.innerHTML=`
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:16px">
      <div class="grid2">
        <div class="sec-card">
          <div class="sec-title">Market Overview</div>
          ${dr("Market Segment",mk.segment,"accent")}
          ${dr("Primary Uses",mk.use)}
          ${dr("Market CAGR",`<span style="color:#22c55e;font-weight:700;font-size:14px">${mk.cagr}</span>`)}
          ${dr("Demand Seasonality",mk.seasonality)}
          ${dr("Substitute Products",mk.substitutes)}
        </div>
        <div class="sec-card">
          <div class="sec-title">Demand Analysis</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
            ${[["Retail",mk.retail],["Bulk",mk.bulk],["Export",mk.exportDemand]].map(([l,v])=>{
              const c=v==="Very High"?"#22c55e":v==="High"?"#f59e0b":"#0d9488";

                <div style="font-size:13px;font-weight:700;color:${c}">${v||"Medium"}</div>

        <div class="sec-title">Major Buyers & End Markets</div>
        <div style="columns:2;gap:16px">${buyers}</div>
      </div>
    </div>
  `;

// ═══════════════════════════════════════════════════════════════════════════
// TAB 8 — SUPPLIERS
// ═══════════════════════════════════════════════════════════════════════════
function renderSupplier(p){
  const sups=p.suppliers||[];
  const el=document.getElementById("tab-supplier");
  if(!sups.length){
    el.innerHTML=`<div style="margin-top:16px"><div class="sec-card"><div class="empty">No specific supplier data for this product. Contact regional APMC / FPOs in the growing belts listed under Regions tab.</div></div></div>`;
    return;
  }
  const cards=sups.map(s=>{
    const rel=s.reliability||5;
    const stars=Array.from({length:10},(_,i)=>`<span class="rel-star" style="color:${i<rel?"#f59e0b":"#cbd5e1"}">${i<rel?"★":"★"}</span>`).join("");
    return `<div class="sup-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="sup-name">🏭 ${s.name}</div>
        <div style="font-size:11px;color:#f59e0b">${rel}/10 Reliability</div>
      </div>
      <div class="rel-stars" style="margin-bottom:8px">${stars}</div>
      <div class="grid2" style="gap:8px;margin-bottom:8px">
        <div style="font-size:11px;color:var(--text3)">👤 Contact: <span style="color:var(--text2)">${s.contact}</span></div>
        <div style="font-size:11px;color:var(--text3)">📱 Phone: <span style="color:var(--text2)">${s.phone}</span></div>
        <div style="font-size:11px;color:var(--text3)">📍 Location: <span style="color:var(--accent2)">${s.district}, ${s.state}</span></div>
        <div style="font-size:11px;color:var(--text3)">🌾 Farm Size: <span style="color:var(--text2)">${s.size}</span></div>
        <div style="font-size:11px;color:var(--text3)">📦 Min Order: <span style="color:var(--gold2)">${s.moq}</span></div>
        <div style="font-size:11px;color:var(--text3)">💳 Terms: <span style="color:var(--text2)">${s.terms}</span></div>
      </div>
      ${s.note?`<div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);border-radius:6px;padding:8px;font-size:11px;color:var(--text3)">💡 ${s.note}</div>`:""}
    </div>`;
  }).join("");
  el.innerHTML=`
    <div style="margin-top:16px;display:flex;flex-direction:column;gap:0">
      <div class="sec-card">
        <div class="sec-title">Verified Supplier Contacts</div>
        ${cards}
        <div style="background:rgba(13,148,136,.08);border:1px solid rgba(13,148,136,.2);border-radius:8px;padding:12px;margin-top:12px;font-size:12px;color:var(--teal2)">
          💡 <strong>Tip:</strong> Always visit APMC mandi and meet farmers directly before finalizing contracts. Register on <strong>AgriMarket / eNAM portal</strong> for additional supplier discovery. FPO (Farmer Producer Organizations) give better pricing and volume guarantees.
        </div>
      </div>
    </div>
  `;
}
